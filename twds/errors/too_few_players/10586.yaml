deck:
  name: Fleurdumal and Other Stories
  description: 'This is something of a hybrid between a Malk dementation bleed deck and a Toreador tap and bleed. I think
    the crypt is awesome and pretty unique: five vampires with AUS DEM PRE, which also happen to come with votes, +bleed and/or
    useful specials. This allows for a very versatile deck: consistent mid-stealth bleed power combined with a sturdy defensive
    package (the flexibility of Random Patterns helps a lot) and some vote. Moreover, the deck has three ways to look at other
    players‘ hands (Patterns in the Chaos + Specials of Fleurdumal and Alicia Barrows), which helps a lot, especially in an
    Archon-heavy meta.'
