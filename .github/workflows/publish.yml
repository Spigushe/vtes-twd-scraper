name: Publish TWD Deck PRs

on:
  # Run every Monday at 08:00 UTC (after the weekly scrape has run)
  schedule:
    - cron: "0 8 * * 1"

  # Manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the publish report back to this repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: "pip"

      - name: Set UTF-8 encoding
        run: echo "PYTHONUTF8=1" >> $GITHUB_ENV

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Publish deck PRs to GiottoVerducci/TWD
        env:
          # A PAT with 'public_repo' scope stored as TWD_GITHUB_TOKEN.
          # The script forks GiottoVerducci/TWD into the token owner's account
          # and opens a PR from the fork — no direct write access to that repo needed.
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: vtes-scraper publish --verbose

      - name: Commit publish report
        run: |
          git add publish/
          if git diff --staged --quiet; then
            echo "No report changes to commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: publish report $(date -u +%Y-%m-%d)"
            git push
          fi
